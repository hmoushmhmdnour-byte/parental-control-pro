name: parental_control_child
description: Professional Parental Control App - Child Device Monitor
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  firebase_database: ^10.2.0
  firebase_messaging: ^14.7.0
  cloud_firestore: ^4.14.0

  # State Management
  get: ^4.6.5
  provider: ^6.1.0

  # Location Services
  geolocator: ^10.1.0
  location: ^5.0.1
  background_location: ^0.10.3

  # Device Info
  device_info_plus: ^9.1.1
  app_usage: ^2.1.3
  installed_apps: ^0.7.5
  package_info_plus: ^5.0.1

  # UI
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  intl: ^0.19.0

  # Utils
  http: ^1.1.0
  dio: ^5.3.1
  shared_preferences: ^2.2.2
  uuid: ^4.0.0

  # Notification Handling
  flutter_local_notifications: ^16.2.0

  # Logging
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
